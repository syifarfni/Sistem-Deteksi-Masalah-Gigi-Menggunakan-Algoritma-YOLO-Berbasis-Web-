<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Sistem Deteksi Gigi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(145deg, #e9f7ff, #dceeff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      border: none;
    }
    .card-header {
      background: linear-gradient(135deg, #5465ff, #788bff);
      color: white;
      border-radius: 15px 15px 0 0 !important;
      text-align: center;
      padding: 20px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #5465ff, #788bff);
      border: none;
      border-radius: 50px;
      padding: 10px 20px;
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(84, 101, 255, 0.3);
    }
    .form-control {
      border-radius: 10px;
      padding: 12px 15px;
    }
    .logo {
      font-size: 24px;
      font-weight: 700;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo i {
      margin-right: 10px;
    }
    .register-link {
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <div class="logo">
              <i class="fas fa-tooth"></i> DentScan
            </div>
            <h4 class="mt-2">Login</h4>
          </div>
          <div class="card-body p-4">
            <form method="post">
              {% csrf_token %}
              <input type="hidden" name="next" value="{{ request.GET.next }}">
              
              <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Masukkan username" required>
              </div>
              
              <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Masukkan password" required>
              </div>
              
              <button type="submit" class="btn btn-primary btn-block mt-4">Login</button>
              
              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-danger mt-3">{{ message }}</div>
                {% endfor %}
              {% endif %}
            </form>
            
            <div class="register-link">
              Belum memiliki akun? <a href="{% url 'register' %}">Daftar disini</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
